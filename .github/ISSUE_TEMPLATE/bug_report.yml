name: Bug report
description: Tell us what did not work.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Never include API keys, proprietary source code, or other secrets."
  - type: input
    id: version
    attributes:
      label: Extension version
      placeholder: "0.1.1"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: VS Code version and operating system
      placeholder: "VS Code 1.xx, Windows 11"
    validations:
      required: true
  - type: input
    id: provider
    attributes:
      label: Provider and model
      placeholder: "DeepSeek / deepseek-chat"
  - type: textarea
    id: behavior
    attributes:
      label: What happened?
      description: "Include the error message and safe reproduction steps."
    validations:
      required: true
