name: Feature request
description: Suggest an improvement to the code-reading experience.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What code-reading problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Your proposed experience
      description: "A short workflow, sketch, or example is especially helpful."
    validations:
      required: true
